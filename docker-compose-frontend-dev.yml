# =============================================================================
# service-portal-frontend — Stack mínima para desenvolvimento
# =============================================================================
#
# Sobe apenas o que o frontend depende diretamente:
#   - Authentik (IdP real — necessário para JWT e fluxo OAuth2/PKCE)
#   - WireMock (substitui Orchestrator + Manager — sem Kafka/Redis/RabbitMQ/Mongo)
#   - BFF (configurado para apontar para WireMock no lugar dos serviços reais)
#
# Uso:
#   docker compose -f docker-compose-frontend-dev.yml up -d
#   npm install && npm run dev   # frontend Vite em http://localhost:5173
#   docker compose -f docker-compose-frontend-dev.yml down
# =============================================================================

services:

  postgresql:
    image: docker.io/library/postgres:16-alpine
    container_name: dev-postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 10s
      interval: 15s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD: ${PG_PASS:-authentik}
      POSTGRES_USER:     ${PG_USER:-authentik}
      POSTGRES_DB:       ${PG_DB:-authentik}

  authentik-server:
    image: ghcr.io/goauthentik/server:2026.2.1
    container_name: dev-authentik-server
    command: server
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python3 -c "
          import urllib.request, sys
          try:
            urllib.request.urlopen('http://localhost:9000/-/health/ready/', timeout=5)
            sys.exit(0)
          except Exception:
            sys.exit(1)
          "
      start_period: 60s
      interval: 20s
      timeout: 10s
      retries: 5
    environment:
      AUTHENTIK_SECRET_KEY:           ${AUTHENTIK_SECRET_KEY:-changeme-dev-only-secret-at-least-50-chars-please-replace-me}
      AUTHENTIK_POSTGRESQL__HOST:     postgresql
      AUTHENTIK_POSTGRESQL__USER:     ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME:     ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS:-authentik}
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - "${AUTHENTIK_PORT_HTTP:-9000}:9000"

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2.1
    container_name: dev-authentik-worker
    command: worker
    user: root
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      AUTHENTIK_SECRET_KEY:           ${AUTHENTIK_SECRET_KEY:-changeme-dev-only-secret-at-least-50-chars-please-replace-me}
      AUTHENTIK_POSTGRESQL__HOST:     postgresql
      AUTHENTIK_POSTGRESQL__USER:     ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME:     ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS:-authentik}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgresql:
        condition: service_healthy

  wiremock:
    image: wiremock/wiremock:3.9.1
    container_name: dev-wiremock
    command: ["--port", "8080", "--global-response-templating", "--verbose"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health || exit 1"]
      start_period: 10s
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - ../wiremock/mappings:/home/wiremock/mappings:ro
      - ../wiremock/__files:/home/wiremock/__files:ro

  bff:
    build:
      context: ../service-portal-bff
      dockerfile: Dockerfile
    container_name: dev-bff
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/bff/health || exit 1"]
      start_period: 45s
      interval: 15s
      timeout: 5s
      retries: 5
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # WireMock substitui Orchestrator e Manager
      ORCHESTRATOR_URL:       http://wiremock:8080
      ORCHESTRATOR_USERNAME:  ${ORCHESTRATOR_USERNAME:-admin}
      ORCHESTRATOR_PASSWORD:  ${ORCHESTRATOR_PASSWORD:-admin}
      MANAGER_URL:            http://wiremock:8080
      MANAGER_USERNAME:       ${MANAGER_ADMIN_USERNAME:-admin}
      MANAGER_PASSWORD:       ${MANAGER_ADMIN_PASSWORD:-admin}
      AUTHENTIK_JWKS_URI:     http://authentik-server:9000/application/o/${AUTHENTIK_APP_SLUG:-service-portal}/jwks/
      AUTHENTIK_ISSUER_URI:   http://localhost:${AUTHENTIK_PORT_HTTP:-9000}/application/o/${AUTHENTIK_APP_SLUG:-service-portal}/
      AUTHENTIK_CLIENT_ID:    ${AUTHENTIK_CLIENT_ID:-service-portal-spa}
    depends_on:
      authentik-server:
        condition: service_healthy
      wiremock:
        condition: service_healthy
    ports:
      - "${BFF_PORT:-8081}:8081"
